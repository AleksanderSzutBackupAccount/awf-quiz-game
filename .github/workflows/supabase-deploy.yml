name: Deploy Supabase

# Wgrywa migracje bazy na produkcyjny projekt Supabase przy każdym pushu do main,
# który zmienia cokolwiek w supabase/migrations.
# Uwaga: NIE robimy `supabase config push` — ustawienia auth (Site URL, Redirect
# URLs, provider Google) są zarządzane w Dashboardzie produkcyjnego projektu, żeby
# lokalny config.toml (localhost) ich nie nadpisywał.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push database migrations
        run: supabase db push
